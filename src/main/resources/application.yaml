spring:

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    enabled: true

  datasource:
    url: jdbc:postgresql://localhost:5433/branchdb
    username: branchuser
    password: 123456
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 30000
      pool-name: HikariPool

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC


  data:
    redis:
      host: localhost
      port: 6380
      username: default
      timeout: 5000ms

server:
  port: 8085
  servlet:
    context-path: /branch-service